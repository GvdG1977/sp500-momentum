name: Update Momentum Data

on:
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC
  workflow_dispatch:  # Allow manual trigger

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run data fetch script
        run: python fetch_data.py

      - name: Verify data update
        run: |
          if [ ! -f data.json ]; then
            echo "data.json not found"
            exit 1
          fi
          size=$(stat -c%s data.json 2>/dev/null || stat -f%z data.json)
          if [ "$size" -lt 1000 ]; then
            echo "data.json too small: $size bytes"
            exit 1
          fi
          echo "data.json updated successfully, size: $size bytes"

      - name: Check for changes
        id: verify-changed-files
        run: |
          if [ -n "$(git diff --name-only data.json)" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.verify-changed-files.outputs.changed == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/GvdG1977/sp500-momentum.git
          git add data.json
          git commit -m "Update momentum data"
          git push
