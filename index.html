<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S&P 500 Momentum Ranking</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>S&P 500 Stock Momentum Ranking</h1>
        <p>Ranking based on 12-1 month price returns</p>
        <div id="loading">Loading data...</div>
        <table id="stockTable">
            <thead>
                <tr>
                    <th>Rank</th>
                    <th>Ticker</th>
                    <th>Company Name</th>
                    <th>12-1 Month Return (%)</th>
                    <th>Current Price</th>
                </tr>
            </thead>
            <tbody id="stockBody">
            </tbody>
        </table>
    </div>
    <script src="script.js"></script>
</body>
</html>
